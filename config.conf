# This is the main Krypton configuration file. All settings in this file apply globally
# across the entire server, regardless of what they are.
# 
# If you need any help with any of the settings in this file, you can join us on Discord
# at https://discord.gg/4QuwYACDRX

# The main server settings.
server {
    # The IP used by players to connect. 0.0.0.0 means listen on all interfaces.
    ip="0.0.0.0"
    # The port used by players to connect.
    port=25571
    # Whether the server authenticates users with Mojang.
    online-mode=false
    # The threshold at which packets larger will be compressed. Set to -1 to disable.
    compression-threshold=256
    # If console messages should be sent to admins with the permission krypton.broadcast_admins
    broadcast-console-to-admins=true
    # Settings for the server resource pack
    resource-pack {
        # The URI where the resource pack is located.
        uri=""
        # The hash used to verify the downloaded resource pack is correct.
        hash=""
        # If clients will be forced to accept the resource pack.
        forced=false
    }
}
# Status configuration
status {
    # If this server responds to status requests from clients.
    enabled=true
    # The message of the day. Supports legacy and hex codes (using &#).
    motd="&#8000ffKrypton is a Minecraft server written in Kotlin!"
    # The upper limit of the player count. Any players that try to join when this is reached will be kicked.
    max-players=20
}
# Global world configuration options
world {
    # The name of the folder with the world to load in it.
    name=world
    # Settings for world generation
    generator {
        # The world generation settings as a JSON string
        settings="{}"
        # The seed for the world. Leave blank for random
        seed=""
        # The type of world to generate
        type="minecraft:normal"
        # If structures should be generated
        structures=true
    }
    # The game mode for this world. Valid values are: 0-3 (legacy), survival, creative, adventure and spectator (case insensitive).
    default-game-mode=creative
    # Whether the game mode should be forced for all players in the world.
    force-default-game-mode=false
    # The default difficulty. Valid values are: 0-3 (legacy), peaceful, easy, normal and hard (case insensitive).
    difficulty=normal
    # If this server is in hardcore mode. Currently does nothing.
    hardcore=false
    # If command blocks are allowed to be used by players.
    allow-command-blocks=false
    # The render distance of the server. This is how many chunks you can see in front of you, excluding the one you are in.
    view-distance=10
    # The distance, in chunks, that the client will simulate things, like entities.
    simulation-distance=10
    # The amount of time (in ticks) between automatic world saves.
    autosave-interval=6000
    # The radius from spawn in which players cannot break blocks.
    spawn-protection-radius=0
    # If the spawn protection message should be sent to players in protection.
    send-spawn-protection-message=true
    # The message sent to players that try to break blocks in spawn.
    spawn-protection-message="&c&lYou are currently in a protected area. You may not break blocks here."
}
# Advanced settings. Don't touch these unless you know what you're doing.
advanced {
    # Whether to use the DSYNC option for saving region files to disk.
    synchronize-chunk-writes=true
    # Whether the server should load and save player data to and from files
    serialize-player-data=true
    # If the server should enforce that all game profiles have properties with valid signatures.
    enforce-secure-profiles=false
    # The maximum number of updates to block neighbours that may be executed in bulk.
    maximum-chained-neighbour-updates=1000000
    # If we should enable bStats metrics for the server
    metrics=true
    # The duration (in seconds) a single tick must take before the single tick profiler reports it.
    save-threshold=5
    # Whether player chat messages should be sent to the console. Disable if you have a lot of players sending a lot of messages.
    log-player-chat-messages=true
    # The view (render) distance for entities, in chunks.
    entity-view-distance=5
}
# Proxy IP forwarding settings.
proxy {
    # 
    # The method to use for forwarding a connecting user's information on
    # to Krypton from a proxy server. Supported values are:
    #   - NONE - Disable forwarding support completely
    #   - LEGACY - Use the BungeeCord/pre-1.13 method
    #   - MODERN - Use Velocity's modern forwarding protocol
    #   - TCPSHIELD - Use TCPShield's forwarding protocol
    # When any mode other than NONE or TCPSHIELD is used, the server will be forced
    # offline and will ONLY accept connections from proxies. No users will be able to
    # direct connect.
    # 
    mode=NONE
    # The forwarding secret from Velocity. Only used in the MODERN forwarding protocol.
    secret=""
}
# Module settings.
modules {
    # All the modules that should be enabled.
    enabled=[]
}
